<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極簡計算機</title>
    <style>
        :root {
            /* 調整為更優雅的淺藍灰調 */
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --primary-color: #667eea;
            --accent-color: #764ba2;
            --text-main: #2d3436;
            --text-muted: #b2bec3;
            --shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-gradient);
        }

        .container {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            width: 90%;
            max-width: 380px;
            backdrop-filter: blur(10px);
        }

        h2 {
            margin: 0 0 25px 0;
            font-weight: 600;
            color: var(--text-main);
            font-size: 20px;
            letter-spacing: 1px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 16px;
            border: 1.5px solid #edf2f7;
            border-radius: 14px;
            font-size: 16px;
            background-color: #f8fafc;
            color: var(--text-main);
            transition: all 0.3s ease;
            outline: none;
            text-align: center;
        }

        input:focus {
            border-color: var(--primary-color);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        /* 隱藏 input number 的箭頭 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .box {
            aspect-ratio: 1 / 1;
            background-color: #fff;
            border: 1px solid #edf2f7;
            border-radius: 16px;

            font-size: 20px;
            font-weight: 500;
            color: var(--primary-color);
            cursor: pointer;
            
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            
            display: flex;
            align-items: center;
            justify-content: center;
            
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
        }

        .box:hover {
            background-color: var(--primary-color);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(102, 126, 234, 0.2);
        }

        .box:active {
            transform: translateY(0);
        }

        #result-container {
            padding-top: 25px;
            border-top: 2px solid #f1f5f9;
        }

        .label {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        #result {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            word-break: break-all;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>極簡計算機</h2>
        
        <div class="input-group">
            <input type="number" id="num01" placeholder="第一個數字" spellcheck="false">
            <input type="number" id="num02" placeholder="第二個數字" spellcheck="false">
        </div>

        <div class="button-grid">
            <button class="box" type="button">+</button>
            <button class="box" type="button">−</button>
            <button class="box" type="button">×</button>
            <button class="box" type="button">÷</button>
        </div>

        <div id="result-container">
            <div class="label">Result</div>
            <div id="result">0</div>
        </div>
    </div>

    <script>
        const ansArea = document.querySelector('#result');
        const buttons = document.querySelectorAll('.box');

        buttons.forEach(function (btn) {
            btn.addEventListener('click', function () {
                const val1 = document.querySelector('#num01').value;
                const val2 = document.querySelector('#num02').value;
                
                // 檢查空值
                if (val1 === "" || val2 === "") {
                    ansArea.innerText = "請輸入數字";
                    ansArea.style.fontSize = "20px";
                    return;
                }

                const num1 = Number(val1);
                const num2 = Number(val2);
                const oper = btn.innerText;
                let total = 0;

                ansArea.style.fontSize = "36px"; // 恢復字體大小

                if (oper === '+') total = num1 + num2;
                if (oper === '−') total = num1 - num2;
                if (oper === '×') total = num1 * num2;
                if (oper === '÷') {
                    total = num2 !== 0 ? (num1 / num2) : 'Error';
                }

                // 處理小數點
                if (typeof total === 'number' && !Number.isInteger(total)) {
                    total = parseFloat(total.toFixed(4));
                }

                ansArea.innerText = total;
            });
        });
    </script>

</body>
</html>
