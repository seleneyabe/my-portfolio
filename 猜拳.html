<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔法森林大冒險 - 剪刀石頭布</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');

        :root {
            --forest-dark: rgba(10, 25, 20, 0.85);
            --forest-mid: rgba(18, 53, 36, 0.6);
            --magic-glow: #00ffcc;
            --magic-gold: #ffdf00;
            --glass-bg: rgba(20, 45, 35, 0.4);
            --glass-border: rgba(0, 255, 204, 0.2);
        }

        * {
            box-sizing: border-box;
            cursor: none; /* 隱藏預設鼠標，使用自定義魔法光暈 */
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* 套用自訂背景圖片，並疊加半透明的魔法漸層讓 UI 保持清晰 */
            background: radial-gradient(circle at 50% 30%, var(--forest-mid) 0%, var(--forest-dark) 80%, #000000 100%), 
                        url('./img/森林.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            
            font-family: 'Noto Serif TC', serif;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* 背景魔法光斑疊加層 */
        .ambient-light {
            position: absolute;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(0, 255, 204, 0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* 玻璃擬態主容器 */
        .container {
            position: relative;
            z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 2.5rem;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 0 20px rgba(0, 255, 204, 0.05);
            text-align: center;
            max-width: 480px;
            width: 90%;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            box-shadow: 0 30px 60px rgba(0,0,0,0.7), inset 0 0 30px rgba(0, 255, 204, 0.1);
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 1.5rem;
            color: #e0f7fa;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.6), 0 0 30px rgba(0, 255, 204, 0.3);
            letter-spacing: 2px;
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            margin-bottom: 2rem;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
            font-weight: bold;
            color: #b2dfdb;
        }

        .display-area {
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-bottom: 2rem;
        }

        .choice-display {
            font-size: 4.5rem;
            width: 100px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            border-radius: 50%;
            animation: float-slight 3s infinite ease-in-out;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.2));
        }

        .vs-text {
            font-size: 1.5rem;
            color: var(--magic-gold);
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 223, 0, 0.5);
            font-family: sans-serif;
            font-style: italic;
        }

        .options {
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .option-btn {
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(0,0,0,0.2));
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            width: 80px;
            height: 80px;
            font-size: 2.5rem;
            cursor: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4), inset 0 0 15px rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        .option-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle, rgba(0, 255, 204, 0.4) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            transition: width 0.4s ease, height 0.4s ease;
            border-radius: 50%;
            z-index: -1;
        }

        .option-btn:hover {
            transform: translateY(-8px) scale(1.15);
            border-color: var(--magic-glow);
            box-shadow: 0 15px 30px rgba(0, 255, 204, 0.3), 0 0 20px rgba(0, 255, 204, 0.4);
            text-shadow: 0 0 15px white;
        }

        .option-btn:hover::before {
            width: 150px;
            height: 150px;
        }

        .option-btn:active {
            transform: scale(0.95);
        }

        .result-text {
            margin-top: 2rem;
            font-size: 1.4rem;
            font-weight: bold;
            min-height: 2rem;
            color: #e0f7fa;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            transition: all 0.3s;
        }

        .firefly {
            position: absolute;
            background: var(--magic-gold);
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 10px 2px var(--magic-gold), 0 0 20px 4px rgba(255, 223, 0, 0.4);
            animation: wander 8s infinite ease-in-out alternate;
            z-index: 5;
        }

        @keyframes wander {
            0% { transform: translate(0, 0) scale(0.8); opacity: 0.3; }
            25% { transform: translate(30px, -50px) scale(1.2); opacity: 1; }
            50% { transform: translate(-20px, -100px) scale(0.9); opacity: 0.5; }
            75% { transform: translate(40px, -150px) scale(1.1); opacity: 0.8; }
            100% { transform: translate(-30px, -200px) scale(0.8); opacity: 0; }
        }

        @keyframes float-slight {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        #magic-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.8) 0%, rgba(0, 255, 204, 0.5) 40%, transparent 80%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
            transition: width 0.2s, height 0.2s, background 0.2s;
            mix-blend-mode: screen;
        }

        .cursor-click {
            width: 50px !important;
            height: 50px !important;
            background: radial-gradient(circle, rgba(255, 223, 0, 0.8) 0%, transparent 70%) !important;
        }
    </style>
</head>
<body>

<div class="ambient-light"></div>
<div id="magic-cursor"></div>

<div class="container">
    <h1>✨ 魔法森林試煉 ✨</h1>
    
    <div class="scoreboard">
        <div>冒險者: <span id="player-score" style="color: var(--magic-glow);">0</span></div>
        <div>森林之靈: <span id="comp-score" style="color: #ff8a80;">0</span></div>
    </div>

    <div class="display-area">
        <div id="player-view" class="choice-display">❔</div>
        <div class="vs-text">VS</div>
        <div id="comp-view" class="choice-display">❔</div>
    </div>

    <div class="options">
        <button class="option-btn" onmouseover="hoverCursor()" onmouseout="unhoverCursor()" onclick="play('✊')">✊</button>
        <button class="option-btn" onmouseover="hoverCursor()" onmouseout="unhoverCursor()" onclick="play('✌️')">✌️</button>
        <button class="option-btn" onmouseover="hoverCursor()" onmouseout="unhoverCursor()" onclick="play('✋')">✋</button>
    </div>

    <div class="result-text" id="result">觸碰符文，開始你的試煉...</div>
</div>

<script>
    // === 音效設定區 ===
    // 建立音效物件 (請確保你的資料夾中有對應的音效檔案)
    const sfxClick = new Audio('./sounds/click.mp3');
    const sfxWin = new Audio('./sounds/win.mp3');
    const sfxLose = new Audio('./sounds/lose.mp3');
    const sfxDraw = new Audio('./sounds/draw.mp3');
    
    // 設定音量 (0.0 到 1.0)
    sfxClick.volume = 0.6;
    sfxWin.volume = 0.8;
    sfxLose.volume = 0.8;
    sfxDraw.volume = 0.7;

    let playerScore = 0;
    let compScore = 0;
    const choices = ['✊', '✌️', '✋'];

    // 遊戲邏輯
    function play(playerChoice) {
        // 播放點擊音效
        sfxClick.currentTime = 0; // 重置音效時間，讓快速點擊不卡頓
        sfxClick.play().catch(e => console.log("等待使用者互動以播放音效"));

        const compChoice = choices[Math.floor(Math.random() * 3)];
        
        // 加上簡單的彈跳動畫重置效果
        const pView = document.getElementById('player-view');
        const cView = document.getElementById('comp-view');
        
        pView.style.animation = 'none';
        cView.style.animation = 'none';
        setTimeout(() => {
            pView.innerText = playerChoice;
            cView.innerText = compChoice;
            pView.style.animation = 'float-slight 3s infinite ease-in-out';
            cView.style.animation = 'float-slight 3s infinite ease-in-out';
        }, 50);
        
        const result = getResult(playerChoice, compChoice);
        displayResult(result);
    }

    function getResult(p, c) {
        if (p === c) return 'draw';
        if (
            (p === '✊' && c === '✌️') ||
            (p === '✌️' && c === '✋') ||
            (p === '✋' && c === '✊')
        ) {
            return 'win';
        }
        return 'lose';
    }

    function displayResult(res) {
        const resultEl = document.getElementById('result');
        if (res === 'win') {
            playerScore++;
            resultEl.innerHTML = "✨ 試煉通過！森林賦予你魔力！";
            resultEl.style.color = "#00ffcc";
            resultEl.style.textShadow = "0 0 10px rgba(0,255,204,0.8)";
            
            // 播放勝利音效
            sfxWin.currentTime = 0;
            sfxWin.play().catch(e => {});

        } else if (res === 'lose') {
            compScore++;
            resultEl.innerHTML = "🥀 靈力不足...被森林之靈擊敗。";
            resultEl.style.color = "#ff6b6b";
            resultEl.style.textShadow = "0 0 10px rgba(255,107,107,0.8)";
            
            // 播放失敗音效
            sfxLose.currentTime = 0;
            sfxLose.play().catch(e => {});

        } else {
            resultEl.innerHTML = "🌫️ 勢均力敵，魔力互相抵消。";
            resultEl.style.color = "#ffd700";
            resultEl.style.textShadow = "0 0 10px rgba(255,223,0,0.8)";
            
            // 播放平手音效
            sfxDraw.currentTime = 0;
            sfxDraw.play().catch(e => {});
        }
        
        document.getElementById('player-score').innerText = playerScore;
        document.getElementById('comp-score').innerText = compScore;
    }

    // 魔法螢火蟲特效
    function createFireflies() {
        for(let i=0; i<25; i++) {
            const f = document.createElement('div');
            f.className = 'firefly';
            const size = Math.random() * 3 + 1 + 'px';
            f.style.width = size;
            f.style.height = size;
            f.style.left = Math.random() * 100 + 'vw';
            f.style.top = Math.random() * 100 + 'vh';
            
            f.style.animationDuration = (Math.random() * 5 + 5) + 's';
            f.style.animationDelay = Math.random() * 5 + 's';
            
            if(Math.random() > 0.5) {
                f.style.background = '#00ffcc';
                f.style.boxShadow = '0 0 10px 2px #00ffcc, 0 0 20px 4px rgba(0, 255, 204, 0.4)';
            }
            
            document.body.appendChild(f);
        }
    }
    createFireflies();

    // 自定義魔法鼠標與互動邏輯
    const cursor = document.getElementById('magic-cursor');
    
    document.addEventListener('mousemove', (e) => {
        requestAnimationFrame(() => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
    });

    document.addEventListener('mousedown', () => {
        cursor.classList.add('cursor-click');
    });

    document.addEventListener('mouseup', () => {
        cursor.classList.remove('cursor-click');
    });

    function hoverCursor() {
        cursor.style.width = '40px';
        cursor.style.height = '40px';
        cursor.style.background = 'radial-gradient(circle, rgba(255, 255, 255, 0.8) 0%, rgba(255, 223, 0, 0.5) 40%, transparent 80%)';
    }

    function unhoverCursor() {
        cursor.style.width = '20px';
        cursor.style.height = '20px';
        cursor.style.background = 'radial-gradient(circle, rgba(255, 255, 255, 0.8) 0%, rgba(0, 255, 204, 0.5) 40%, transparent 80%)';
    }
</script>

</body>
</html>
