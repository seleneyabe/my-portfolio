<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尋找貓咪大作戰</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #1a1208;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
        }

        .ui-panel {
            position: fixed;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            pointer-events: none;
        }

        .score-board {
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.28);
            padding: 8px 28px;
            border-radius: 50px;
            color: #fff;
            font-size: 1.3rem;
            font-weight: bold;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            letter-spacing: 2px;
        }

        .score-board span {
            color: #f1c40f;
            font-size: 1.5rem;
        }

        .tip {
            color: #b0a898;
            font-size: 0.82rem;
            letter-spacing: 1px;
        }

        .light-toggle {
            position: fixed;
            top: 18px;
            right: 20px;
            z-index: 300;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .light-toggle:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        #scene {
            position: fixed;
            inset: 0;
            background: #1a1208;
            overflow: hidden;
        }

        .spotlight {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
            background: radial-gradient(circle 140px at var(--x, 50%) var(--y, 50%),
                    rgba(255, 240, 200, 0.06) 0%,
                    rgba(255, 235, 180, 0.18) 40%,
                    rgba(15, 10, 5, 0.97) 140px,
                    rgba(8, 5, 2, 0.998) 100%);
            transition: background 0.8s ease;
        }

        .spotlight.lights-on {
            background: rgba(0, 0, 0, 0) !important;
        }

        .cat-container {
            position: absolute;
            width: 80px;
            height: 80px;
            cursor: pointer;
            z-index: 50;
            transform-origin: center bottom;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: filter 0.2s ease;
        }

        .cat-container.spotted {
            filter: drop-shadow(0 0 12px rgba(241, 196, 15, 0.4));
        }

        .cat-container.spotted .exclamation {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .cat-container.spotted .tail {
            animation: none;
            transform: rotate(12deg);
        }

        .exclamation {
            position: absolute;
            top: -22px;
            right: 4px;
            font-size: 18px;
            opacity: 0;
            transform: translateY(10px) scale(0);
            transition: all 0.2s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            pointer-events: none;
        }

        .cat-idle .body-group {
            animation: breathe 2.8s infinite ease-in-out;
        }

        .cat-idle .tail {
            transform-origin: center;
            animation: tailWag 3.2s infinite ease-in-out;
        }

        .cat-caught {
            pointer-events: none;
            animation: runAway 0.55s forwards cubic-bezier(0.15, -0.2, 0.75, 0.2);
        }

        @keyframes breathe {

            0%,
            100% {
                transform: scaleY(1) scaleX(1);
            }

            50% {
                transform: scaleY(0.95) scaleX(1.04);
            }
        }

        @keyframes tailWag {

            0%,
            100% {
                transform: rotate(0deg);
            }

            50% {
                transform: rotate(20deg);
            }
        }

        @keyframes runAway {
            0% {
                transform: scale(1.1);
                opacity: 1;
            }

            30% {
                transform: scale(1.3) translateY(-20px);
                opacity: 1;
            }

            100% {
                transform: scale(0.1) translateY(-130px) translateX(90px);
                opacity: 0;
            }
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(0.8);
                opacity: 0;
            }

            40% {
                opacity: 1;
                transform: translateY(-18px) scale(1.1);
            }

            100% {
                transform: translateY(-44px) scale(1);
                opacity: 0;
            }
        }

        .meow-hint {
            position: fixed;
            z-index: 150;
            color: #ff9db5;
            font-weight: 900;
            font-size: 14px;
            pointer-events: none;
            animation: floatUp 1.4s ease-out forwards;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.95);
        }

        .pose-label {
            position: absolute;
            bottom: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: #f1c40f;
            white-space: nowrap;
            opacity: 0.8;
            pointer-events: none;
        }
    </style>
</head>

        <ellipse cx="41" cy="44" rx="5.5" ry="3" fill="${eyeColor}"/>
        <ellipse cx="59" cy="44" rx="5.5" ry="3" fill="${eyeColor}"/>
        <ellipse cx="41" cy="44" rx="2" ry="1.5" fill="#000"/>
        <ellipse cx="59" cy="44" rx="2" ry="1.5" fill="#000"/>
      </g>
      <ellipse cx="50" cy="50" rx="5" ry="4" fill="${innerEar}" opacity="0.7"/>
      <path d="M47 52 Q50 54 53 52" fill="none" stroke="${innerEar}" stroke-width="1.5"/>
      <path d="M58 34 Q62 25 68 28 Q64 36 60 38 Z" fill="${color}"/>
      <path d="M58 34 Q62 25 68 28" fill="none" stroke="${innerEar}" stroke-width="2" stroke-linecap="round"/>
    `
            }
        };

        const poseKeys = Object.keys(poses).filter(p => p !== 'stretching');

        function getCatDef(poseKey, colorSet) {
            const p = poses[poseKey];
            return { svg: p.draw(...colorSet), viewBox: p.viewBox || '0 0 100 100', label: p.label };
        }

        const catColors = [
            ['#1e1e1e', '#f1c40f', '#d47a8f'],
            ['#e8a020', '#2ecc71', '#e07a8f'],
        ];

        let catPoses = [0, 2];

        function drawCat(idx) {
            const svgEl = document.getElementById('svg' + (idx + 1));
            const poseKey = poseKeys[catPoses[idx]];
            const def = getCatDef(poseKey, catColors[idx]);
            svgEl.setAttribute('viewBox', def.viewBox);
            svgEl.innerHTML = def.svg;
            document.getElementById('pose' + (idx + 1)).textContent = def.label;
        }

        drawCat(0);
        drawCat(1);

        document.addEventListener('mousemove', (e) => {
            document.documentElement.style.setProperty('--x', e.clientX + 'px');
            document.documentElement.style.setProperty('--y', e.clientY + 'px');
            if (!lightsOn) {
                cats.forEach(cat => {
                    if (!cat.classList.contains('cat-caught')) {
                        const rect = cat.getBoundingClientRect();
                        const cx = rect.left + rect.width / 2;
                        const cy = rect.top + rect.height / 2;
                        const d = Math.hypot(e.clientX - cx, e.clientY - cy);
                        cat.classList.toggle('spotted', d < 120);
                    }
                });
            }
        });

        function respawnCat(cat) {
            const pad = 90, topPad = 140;
            const maxX = window.innerWidth - pad * 2;
            const maxY = window.innerHeight - topPad - pad;
            cat.style.left = Math.floor(Math.random() * maxX) + pad + 'px';
            cat.style.top = Math.floor(Math.random() * maxY) + topPad + 'px';
        }

        function nextPose(idx) {
            catPoses[idx] = (catPoses[idx] + 1) % poseKeys.length;
            drawCat(idx);
        }

        function catchCat(e, cat) {
            if (cat.classList.contains('cat-caught')) return;
            e.stopPropagation();
            score++;
            scoreEl.textContent = score;
            cat.classList.remove('cat-idle', 'spotted');
            cat.classList.add('cat-caught');

            const hint = document.createElement('div');
            hint.className = 'meow-hint';
            hint.textContent = ['喵嗚！', '喵～', '哎呀！', '喵？！'][Math.floor(Math.random() * 4)];
            hint.style.left = cat.style.left;
            hint.style.top = (parseInt(cat.style.top) - 10) + 'px';
            document.body.appendChild(hint);
            setTimeout(() => hint.remove(), 1400);

            const idx = cat.id === 'cat1' ? 0 : 1;
            setTimeout(() => {
                nextPose(idx);
                respawnCat(cat);
                cat.classList.remove('cat-caught');
                cat.classList.add('cat-idle');
                if (lightsOn) cat.classList.remove('spotted');
            }, 500);
        }

        function toggleLight() {
            lightsOn = !lightsOn;
            if (lightsOn) {
                spotlight.classList.add('lights-on');
                lightBtn.textContent = '關燈';
                tipEl.textContent = '客廳亮了！點擊抓住搗蛋貓！';
                cats.forEach(c => c.classList.add('spotted'));
                document.getElementById('lamp-glow').setAttribute('fill', 'rgba(255,200,80,0.18)');
            } else {
                spotlight.classList.remove('lights-on');
                lightBtn.textContent = '開燈';
                tipEl.textContent = '移動手電筒尋找兩隻貓，點擊抓住牠們！';
                cats.forEach(c => c.classList.remove('spotted'));
                document.getElementById('lamp-glow').setAttribute('fill', 'rgba(255,200,80,0)');
            }
        }

        setInterval(() => {
            cats.forEach(cat => {
                if (!cat.classList.contains('spotted') && !cat.classList.contains('cat-caught')) {
                    if (Math.random() > 0.5) {
                        const rect = cat.getBoundingClientRect();
                        const hint = document.createElement('div');
                        hint.className = 'meow-hint';
                        hint.textContent = ['喵嗚...', '喵～🐾', '喵？'][Math.floor(Math.random() * 3)];
                        hint.style.left = rect.left + 15 + 'px';
                        hint.style.top = rect.top - 8 + 'px';
                        document.body.appendChild(hint);
                        setTimeout(() => hint.remove(), 1400);
                    }
                }
            });
        }, 3800);

        cats.forEach(cat => respawnCat(cat));
        window.addEventListener('resize', () => cats.forEach(cat => respawnCat(cat)));
    </script>
</body>

</html>
